name: Build Signed EmojiIQ APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-signed-apk:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Keystore GitHub Secret se decode karke file banao
      - name: Decode Keystore from Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/emojiiq-release.jks

      # ── Signed Release APK build karo
      - name: Build Signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/emojiiq-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── APK upload (download kar sakta hai)
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: EmojiIQ-SIGNED-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 60

      - name: Done!
        run: |
          echo "✅ SIGNED APK Ready!"
          ls -lh android/app/build/outputs/apk/release/
